<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>KaZa - Your Name in Korean</title>
  <script>
    (() => {
      const resolveTheme = () => {
        const hour = new Date().getHours();
        const isDaytime = hour >= 7 && hour < 19;
        const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
        return prefersDark || !isDaytime ? 'dark' : 'light';
      };

      const applyTheme = () => {
        const theme = resolveTheme();
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      };

      applyTheme();
      window.__kazaApplyAutoTheme = applyTheme;
    })();
  </script>

    .keycap.is-space {
      justify-items: center;
      padding: 0;
    }

    .keycap.is-active {
      border-color: color-mix(in srgb, var(--soft-white) 34%, transparent);
      background: var(--keycap-active-bg);
      color: color-mix(in srgb, var(--white) 96%, transparent);
      opacity: 1;
      text-shadow: 0 0 14px color-mix(in srgb, var(--soft-white) 28%, transparent);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, var(--white) 24%, transparent),
        inset 0 -4px 10px color-mix(in srgb, var(--black) 14%, transparent),
        0 4px 0 color-mix(in srgb, var(--black) 34%, transparent),
        0 11px 22px color-mix(in srgb, var(--black) 16%, transparent),
        0 0 30px color-mix(in srgb, var(--soft-white) 18%, transparent);
      transform: translateY(0.25rem) scale(0.992);
      transition-duration: 140ms;
    }

    .keycap.is-active .keycap-main,
    .keycap.is-active .keycap-line,
    .keycap.is-active .keycap-icon,
    .keycap.is-converting .keycap-main,
    .keycap.is-converting .keycap-line,
    .keycap.is-converting .keycap-icon {
      color: inherit;
    }

    .keycap.is-converting {
      color: color-mix(in srgb, var(--soft-white) 52%, transparent);
      text-shadow: 0 0 14px color-mix(in srgb, var(--soft-white) 14%, transparent);
      border-color: color-mix(in srgb, var(--soft-white) 16%, transparent);
    }

    @keyframes keyboardFloat {
      0%, 100% { transform: var(--camera-transform) translateY(0); }
      43% { transform: var(--camera-transform) translateY(var(--lift, -7px)); }
      72% { transform: var(--camera-transform) translateY(var(--dip, 3px)); }
    }

    .launch-center {
      position: absolute;
      top: clamp(3.4rem, 9vh, 5.8rem);
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 8ch;
      min-height: 1.1em;
      color: var(--text);
      font-size: clamp(5.8rem, 9vw, 8.4rem);
      font-weight: 360;
      line-height: 1;
      text-shadow:
        0 18px 64px color-mix(in srgb, var(--black) 58%, transparent),
        0 0 26px color-mix(in srgb, var(--soft-white) 16%, transparent);
      user-select: none;
      transition: opacity 520ms var(--ease), filter 520ms var(--ease);
    }

    .launch-center.is-resetting {
      opacity: 0;
      filter: blur(8px);
    }

    .launch-cursor {
      width: 1px;
      height: 0.86em;
      margin-left: 0.08em;
      background: color-mix(in srgb, var(--soft-white) 84%, transparent);
      animation: cursorBlink 980ms steps(1, end) infinite;
      box-shadow: 0 0 22px color-mix(in srgb, var(--soft-white) 36%, transparent);
    }

    @keyframes cursorBlink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }

    .stage-start:focus-visible {
      outline: 1px solid color-mix(in srgb, var(--soft-white) 24%, transparent);
      outline-offset: -1.5rem;
    }

    .stage-start::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--black) 22%, transparent), transparent 24%, color-mix(in srgb, var(--black) 28%, transparent) 100%),
        var(--stage-vignette);
    }

    .stage-start.is-transitioning {
      cursor: default;
    }

    .stage-start.is-transitioning .keyboard-bg {
      opacity: 0.34;
      filter: blur(3.5px) saturate(1.06);
      transform: translate3d(0, 34vh, 0) scale(1.48);
      transition:
        opacity 820ms ease,
        filter 820ms ease,
        transform 920ms var(--ease);
    }

    .stage-start.is-transitioning .keyboard-cluster {
      animation-play-state: paused;
    }

    .stage-start.is-transitioning .launch-center {
      opacity: 0;
      filter: blur(12px);
      transform: translate(-50%, -12vh) scale(0.88);
      transition:
        opacity 520ms ease,
        filter 680ms ease,
        transform 760ms var(--ease);
    }

    .transition-jamo {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .transition-jamo span {
      position: absolute;
      left: var(--x);
      top: var(--y);
      color: color-mix(in srgb, var(--text) 72%, transparent);
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
      font-size: clamp(2.2rem, 5vw, 4.8rem);
      font-weight: 850;
      line-height: 1;
      opacity: 0;
      filter: blur(8px);
      transform: translate3d(-50%, 32px, 0) scale(0.94);
    }

    .stage-start.is-transitioning .transition-jamo span {
      animation: jamoLift 760ms var(--ease) both;
      animation-delay: var(--delay);
    }

    .transition-jamo span:nth-child(1) { --x: 42%; --y: 58%; --delay: 80ms; }
    .transition-jamo span:nth-child(2) { --x: 49%; --y: 54%; --delay: 145ms; }
    .transition-jamo span:nth-child(3) { --x: 56%; --y: 59%; --delay: 210ms; }
    .transition-jamo span:nth-child(4) { --x: 63%; --y: 56%; --delay: 275ms; }

    @keyframes jamoLift {
      0% {
        opacity: 0;
        filter: blur(9px);
        transform: translate3d(-50%, 34px, 0) scale(0.94);
      }
      34% {
        opacity: 0.78;
        filter: blur(0);
      }
      100% {
        opacity: 0;
        filter: blur(12px);
        transform: translate3d(-50%, -22vh, 0) scale(1.16);
      }
    }

    .primary-btn,
    .ghost-btn {
      min-height: 58px;
      border-radius: 999px;

      font-weight: 850;
      transition: transform 180ms var(--ease), opacity 180ms ease, background 180ms ease;

    .primary-btn {

    .ghost-btn {

    .primary-btn:disabled {
      cursor: not-allowed;

      transform: none;

    .stage-input {
      place-items: center;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      width: 100%;
      max-width: none;
      margin: 0;
    }

    .stage-input::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--black) 18%, transparent), transparent 34%, color-mix(in srgb, var(--black) 18%, transparent) 100%),
        radial-gradient(ellipse at 50% 45%, transparent 0%, transparent 35%, color-mix(in srgb, var(--black) 22%, transparent) 100%);
    }

    .input-keyboard-echo {
      position: absolute;
      left: 50%;
      bottom: -12rem;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 42rem;

      perspective: 1150px;
      transform: translateX(-50%) translateY(2.5rem) scale(1.02);
      transform-origin: 50% 100%;
      transition:
        opacity 820ms ease,
        filter 920ms ease,
        transform 920ms var(--ease);
    }

    .stage-input.is-active .input-keyboard-echo {

      transform: translateX(-50%) translateY(0) scale(1.14);
    }

    .stage-input.is-generating .input-keyboard-echo {
      opacity: 0.52;
      filter: blur(2px) saturate(1.12) brightness(1.16);
      transform: translateX(-50%) translateY(-3.5rem) scale(1.26);

        filter 620ms ease,
        transform 760ms var(--ease);
    }

    .stage-input.is-generating .input-layout {
      opacity: 0;

        filter 520ms ease,
        transform 640ms var(--ease);

    .input-keyboard-echo .keyboard-cluster {

      animation: none;
      opacity: 0.82;
    }

    .input-keyboard-echo .keyboard-cluster::before {
      opacity: 0.42;
    }

    .input-keyboard-echo .keycap {
      height: 3.9rem;
    }

    .input-layout {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 520px);
      justify-content: center;
      gap: 0;
      align-items: center;
      width: 100%;
      text-align: center;
      transform: translateY(-3.5vh);
      transition:
        opacity 420ms ease,
        filter 520ms ease,
        transform 620ms var(--ease);
    }

    .type-cloud {
      display: none;
    }

    .type-char {
      position: absolute;
      color: var(--type-cloud-color);
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
      font-size: clamp(2.1rem, 5vw, 4.8rem);
      font-weight: 800;
      line-height: 1;
      opacity: 0;
      filter: blur(10px);

      animation-delay: var(--delay);

    .type-char:nth-child(1) { top: 9%; left: 8%; --delay: -0.4s; --duration: 19s; }
    .type-char:nth-child(2) { top: 10%; left: 31%; --delay: -5.2s; --duration: 21s; }
    .type-char:nth-child(3) { top: 9%; right: 12%; --delay: -9.1s; --duration: 20s; }
    .type-char:nth-child(4) { top: 36%; left: 8%; --delay: -3.1s; --duration: 22s; }
    .type-char:nth-child(5) { top: 34%; right: 8%; --delay: -12.4s; --duration: 23s; }
    .type-char:nth-child(6) { bottom: 13%; left: 9%; --delay: -7.6s; --duration: 19s; }
    .type-char:nth-child(7) { bottom: 10%; left: 34%; --delay: -14.2s; --duration: 21s; }
    .type-char:nth-child(8) { bottom: 12%; right: 11%; --delay: -6.5s; --duration: 20s; }
    .type-char:nth-child(9) { top: 20%; right: 31%; --delay: -11.9s; --duration: 23s; }
    .type-char:nth-child(10) { bottom: 26%; right: 27%; --delay: -2.1s; --duration: 22s; }

    @keyframes typeFloat {
      0%, 100% {
        opacity: 0;
        filter: blur(10px);
        transform: scale(0.96);
      }
      18%, 72% {
        opacity: 0.28;
        filter: blur(0);
        transform: scale(1);
      }
      45% {
        opacity: 0.2;
        filter: blur(0);
        transform: scale(1.045);
      }
    }

    .kicker {
      color: var(--gold);

    /* The pitch line — visible on every breakpoint so the hero's promise
       carries into the input beat. Per-size tuning lives in the media queries. */
    .input-title {

      background: color-mix(in srgb, var(--panel) 72%, transparent);
      box-shadow:
        0 24px 90px color-mix(in srgb, var(--black) 24%, transparent),

    .result-label {

      font-size: 0.86rem;
      font-weight: 850;

    .korean-name-visual {

      display: grid;
      place-items: center;
      min-height: clamp(7rem, 17vw, 12rem);
      margin-top: 1.2rem;

      width: 0.055em;

      display: inline-block;
      animation: charReveal 680ms var(--ease) both;
      animation-delay: var(--delay);
    }

    @keyframes charReveal {
      from { opacity: 0; filter: blur(18px); transform: translateY(22px); }
      to { opacity: 1; filter: blur(0); transform: translateY(0); }
    }

    .stroke-composition {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.18em;
      pointer-events: none;
      font-size: clamp(5rem, 13vw, 9rem);
      line-height: 0.92;
    }

    .stroke-glyph {
      position: relative;
      display: inline-grid;
      width: 0.92em;
      height: 0.92em;
      place-items: center;
      contain: layout paint;
    }

    .stroke-glyph svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .stroke-line {
      fill: none;
      stroke: var(--white);
      stroke-width: 9.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
      shape-rendering: geometricPrecision;
      pathLength: 1;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      opacity: 0;
      animation:
        strokeDraw 760ms var(--ease) both,
        strokeFade 680ms var(--ease) forwards;
      animation-delay: var(--delay), var(--fade-delay);
    }

    .stroke-part {
      opacity: 0;
      animation: strokePartGlow 920ms var(--ease) both;
      animation-delay: var(--delay);
    }

    .stroke-final {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--white);
      font-weight: 950;
      line-height: 0.92;
      opacity: 0;
      filter: blur(18px);
      transform: scale(0.985);
      animation: compositionFinal 900ms var(--ease) both;
      animation-delay: var(--delay);
    }

    @keyframes strokeDraw {
      0% { opacity: 0; stroke-dashoffset: 1; }
      16% { opacity: 1; }
      100% { opacity: 1; stroke-dashoffset: 0; }
    }

    @keyframes strokeFade {
      from { opacity: 1; filter: blur(0); }
      to { opacity: 0; filter: blur(10px); }
    }

    @keyframes strokePartGlow {
      0% { opacity: 0; }
      28%, 100% { opacity: 1; }
    }

    @keyframes compositionFinal {
      0% { opacity: 0; filter: blur(18px); transform: scale(0.985); }
      100% { opacity: 1; filter: blur(0); transform: scale(1); }
    }

    .korean-roman-display {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.35rem;
      margin-top: 1.15rem;
      padding: 0.18rem 0.82rem 0.24rem;
      border: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
      border-radius: 999px;
      background: color-mix(in srgb, var(--bg) 66%, transparent);
      box-shadow:
        0 12px 34px color-mix(in srgb, var(--black) 10%, transparent),
        inset 0 1px 0 color-mix(in srgb, var(--white) 12%, transparent);
      color: color-mix(in srgb, var(--text) 74%, transparent);
      font-size: 1.45rem;
      font-weight: 820;
      line-height: 1;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .korean-original-display {
      margin-top: 0.25rem;
      color: var(--faint);
      font-size: 0.96rem;
    }

    .source-tag {
      display: none;
      width: fit-content;
      margin-top: 1.2rem;
      padding: 0.4rem 0.75rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: var(--surface-bg);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .name-card {
      position: relative;
      width: 100%;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 34px;
      background: linear-gradient(145deg, var(--surface-bg-strong), var(--surface-bg));
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: transform 360ms var(--ease), box-shadow 360ms var(--ease);
    }

    .name-card.is-updated {
      animation: cardPop 380ms var(--ease);
    }

    @keyframes cardPop {
      0% { transform: scale(0.985); }
      55% { transform: scale(1.012); }
      100% { transform: scale(1); }
    }

    .name-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, color-mix(in srgb, var(--soft-white) 18%, transparent), transparent 36%, color-mix(in srgb, var(--soft-white) 14%, transparent));
    }

    .card-content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(210px, 0.82fr) minmax(280px, 1fr);
      min-height: 390px;
    }

    .card-left {
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 2rem;
      border-right: 1px solid var(--line);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .card-brand {
      color: var(--text);
      font-size: 1.15rem;
      font-weight: 950;
    }

    .card-label {
      color: var(--muted);
      font-size: 0.78rem;
      text-align: right;
    }

    .card-left-title {
      margin-top: auto;
      color: var(--text);
      font-size: 2.25rem;
      line-height: 0.98;
      font-weight: 950;
    }

    .card-left-subtitle {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .card-left-meta {
      margin-top: 1.3rem;
      color: var(--faint);
      font-size: 0.8rem;
      font-weight: 800;
    }

    .barcode {
      width: min(100%, 220px);
      height: 54px;
      margin-top: 2.5rem;
      border-radius: 4px;
      opacity: 0.72;
      background: repeating-linear-gradient(90deg, color-mix(in srgb, var(--soft-white) 66%, transparent) 0 3px, transparent 3px 7px, color-mix(in srgb, var(--soft-white) 48%, transparent) 7px 10px, transparent 10px 15px);
    }

    .card-right {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      padding: 2rem;
    }

    .scratch-panel {
      position: relative;
      width: 100%;
      min-height: 272px;
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      background: radial-gradient(circle at 50% 22%, color-mix(in srgb, var(--soft-white) 13%, transparent), transparent 34%), var(--surface-bg);
      touch-action: none;
      user-select: none;
    }

    .scratch-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 272px;
      padding: 1.5rem;
      opacity: 0.42;
      filter: blur(8px);
      transform: scale(0.985);
      transition: opacity 380ms var(--ease), filter 380ms var(--ease), transform 380ms var(--ease);
    }

    .name-card.is-revealed .scratch-content {
      opacity: 1;
      filter: blur(0);
      transform: scale(1);
    }

    .scratch-canvas {
      position: absolute;
      inset: 0;
      z-index: 3;
      width: 100%;
      height: 100%;
      cursor: grab;
      transition: opacity 380ms var(--ease);
    }

    .scratch-canvas:active {
      cursor: grabbing;
    }

    .name-card.is-revealed .scratch-canvas {
      opacity: 0;
      pointer-events: none;
    }

    .scratch-prompt {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      color: var(--scratch-text);
      font-size: 1rem;
      font-weight: 850;
      text-align: center;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .scratch-panel.is-scratching .scratch-prompt,
    .name-card.is-revealed .scratch-prompt {
      opacity: 0;
    }

    .scratch-progress {
      position: absolute;
      right: 1rem;
      bottom: 0.85rem;
      z-index: 4;
      color: var(--scratch-text);
      font-size: 0.72rem;
      font-weight: 850;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .name-card.is-revealed .scratch-progress {
      opacity: 0;
    }

    .card-name {
      min-height: 4.4rem;
      color: var(--text);
      font-size: clamp(3rem, 7vw, 4.5rem);
      line-height: 1;
      font-weight: 950;
      text-align: center;
      word-break: keep-all;
    }

    .card-detail {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 0.8rem;
      width: 100%;
      padding: 0.42rem 0;
      align-items: baseline;
    }

    .card-detail-label {
      color: var(--faint);
      font-size: 0.76rem;
      font-weight: 800;
    }

    .card-detail-value {
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 700;
      overflow-wrap: anywhere;
      text-align: right;
    }

    .card-phonemes {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.45rem;
      margin-top: 1rem;
    }

    .phoneme-chip {
      padding: 0.34rem 0.56rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-bg);
      color: var(--silver);
      font-family: "SF Mono", "Courier New", monospace;
      font-size: 0.72rem;
      font-weight: 850;
    }

    /* Desktop refinement — give the input scene more presence on large
       screens so the form doesn't read as a small card lost in white space. */
    @media (min-width: 1024px) {
      .input-layout {
        grid-template-columns: minmax(0, 600px);
      }

      .input-panel {
        width: 100%;
        padding: 1rem;
      }

      .name-input {
        height: 86px;
        border-radius: 26px;
      }

      .generate-btn {
        min-height: 64px;
        margin-top: 0.75rem;
      }
    }

    @media (max-width: 860px) {
      .stage {
        min-height: 100svh;
        padding: max(1.25rem, env(safe-area-inset-top)) 1rem max(2.5rem, env(safe-area-inset-bottom));
      }

      .input-layout,
      .result-layout {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      .input-side {
        display: none;
      }

      .input-title {
        margin-bottom: 1.55rem;
        font-size: clamp(2.4rem, 6vw, 3.4rem);
      }

      .card-content {
        grid-template-columns: 1fr;
      }

      .card-left {
        min-height: 280px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .keyboard-bg {
        inset: 0;
        transform: translate3d(-8vw, 25vh, 0) scale(1.08);
      }

      .keyboard-bg::before {
        inset: 0 0 auto;
        height: 46vh;
      }

      .keyboard-cluster {
        --key-unit: 4.55rem;
        --camera-transform: rotateX(56deg) rotateZ(-2.2deg);
        gap: 0.58rem;
        padding: 2.4rem 2.8rem;
      }

      .keyboard-row {
        gap: 0.5rem;
      }

      .keycap {
        height: 3.9rem;
        border-radius: 0.78rem;
        font-size: 1.32rem;
      }

      .keycap.is-special {
        font-size: 0.66rem;
        padding: 0.56rem 0.64rem;
      }

      .keyboard-row-0 .keycap {
        height: 2.8rem;
        font-size: 0.66rem;
      }

      .launch-center {
        font-size: clamp(4.6rem, 12vw, 6.5rem);
        top: clamp(3.5rem, 8.5vh, 5.5rem);
      }

      .stage-result {
        align-items: center;
        padding-block:
          max(2.5rem, calc(env(safe-area-inset-top) + 1.5rem))
          max(2.5rem, env(safe-area-inset-bottom));
      }

      .input-keyboard-echo {
        bottom: -14rem;
        height: 38rem;
      }

      .stage-input.is-active .input-keyboard-echo {
        opacity: 0.34;
        transform: translateX(-50%) translateY(0) scale(1.08);
      }

      .result-keyboard-echo {
        bottom: -20rem;
      }

      .result-layout {
        align-items: start;
        width: min(100%, 38rem);
      }

      .korean-name-visual {
        min-height: clamp(6.5rem, 22vw, 9rem);
      }

      .korean-name-display,
      .stroke-composition {
        font-size: clamp(4.25rem, 18vw, 7rem);
      }

      .korean-name-display.is-typing-result {
        min-width: 0;
        max-width: 100%;
      }

      .result-actions {
        margin-top: 1.5rem;
      }

      .result-actions .ghost-btn,
      .result-actions .pronounce-btn {
        width: min(100%, 22rem);
      }
    }

    @media (max-width: 480px) {
      .stage {
        padding-inline: 1rem;
      }

      .stage-start {
        min-height: 100svh;
      }

      .keyboard-bg {
        inset: 0;
        transform: translate3d(-24vw, 27vh, 0) scale(0.76);
      }

      .keyboard-bg::before {
        inset: 0 0 auto;
        height: 46vh;
      }

      .keyboard-cluster {
        --key-unit: 3.95rem;
        --camera-transform: rotateX(57deg) rotateZ(-2.8deg);
        gap: 0.46rem;
        padding: 1.9rem 2.1rem;
      }

      .keyboard-row {
        gap: 0.38rem;
      }

      .keycap {
        height: 3.35rem;
        border-radius: 0.72rem;
        font-size: 1.06rem;
      }

      .keycap.is-special {
        font-size: 0.56rem;
        padding: 0.46rem 0.5rem;
      }

      .keyboard-row-0 .keycap {
        height: 2.45rem;
        font-size: 0.56rem;
      }

      .launch-center {
        font-size: clamp(3.6rem, 18vw, 4.7rem);
        top: clamp(3.2rem, 10svh, 4.8rem);
      }

      .stage-input {
        align-items: center;
        min-height: 100svh;
      }

      .input-layout {
        align-content: center;
        transform: translateY(-2vh);
      }

      .type-char {
        font-size: clamp(2rem, 13vw, 3.4rem);
      }

      .input-title {
        max-width: 100%;
        font-size: clamp(2.65rem, 13.4vw, 3.05rem);
        line-height: 0.96;
      }

      .input-panel {
        width: 100%;
        margin-top: 0;
        padding: 0.62rem;
        border-radius: 26px;
      }

      .input-keyboard-echo {
        bottom: -14.5rem;
        height: 35rem;
      }

      .input-keyboard-echo .keyboard-cluster {
        --key-unit: 3.95rem;
        --camera-transform: rotateX(58deg) rotateZ(-2.4deg);
      }

      .stage-input.is-active .input-keyboard-echo {
        opacity: 0.3;
        filter: blur(2.6px);
        transform: translateX(-50%) translateY(0) scale(0.9);
      }

      .stage-input.is-generating .input-keyboard-echo {
        opacity: 0.18;
        transform: translateX(-50%) translateY(-5rem) scale(0.98);
      }

      .name-input {
        height: 68px;
        border-radius: 20px;
        font-size: clamp(1.34rem, 7vw, 1.75rem);
        padding-inline: 1rem;
        text-align: center;
      }

      .generate-btn {
        min-height: 56px;
      }

      .card-left,
      .card-right {
        padding: 1.2rem;
      }

      .scratch-panel,
      .scratch-content {
        min-height: 248px;
      }

      .stage-result {
        place-items: center center;
        padding-top: max(1.5rem, env(safe-area-inset-top));
        padding-bottom: max(2.5rem, env(safe-area-inset-bottom));
      }

      .result-keyboard-echo {
        bottom: -16rem;
        height: 34rem;
      }

      .result-keyboard-echo .keyboard-cluster {
        --key-unit: 3.95rem;
        --camera-transform: rotateX(62deg) rotateZ(0.6deg);
      }

      .stage-result.is-active .result-keyboard-echo {
        opacity: 0.2;
        transform: translateX(-50%) translateY(0) scale(0.92);
      }

      .result-layout {
        gap: 1rem;
      }

      .result-label {
        font-size: 0.78rem;
      }

      .korean-name-visual {
        min-height: clamp(5.4rem, 29vw, 7.2rem);
        margin-top: 0.8rem;
      }

      .korean-name-display,
      .stroke-composition {
        font-size: clamp(3.85rem, 23vw, 5.8rem);
        line-height: 0.96;
      }

      .korean-name-display.is-typing-result {
        justify-content: center;
        overflow-wrap: normal;
      }

      .korean-roman-display {
        margin-top: 0.8rem;
        font-size: 1.1rem;
      }

      .korean-original-display {
        font-size: 0.88rem;
      }

      .result-actions {
        margin-top: 1.25rem;
      }

      .result-actions .ghost-btn {
        min-height: 54px;
      }

      .card-detail {
        grid-template-columns: 1fr;
        gap: 0.15rem;
      }

      .card-detail-value {
        text-align: left;
      }
    }

    @media (max-width: 380px) {
      .keyboard-bg {
        transform: translate3d(-26vw, 28vh, 0) scale(0.68);
      }

      .keyboard-cluster {
        --key-unit: 3.6rem;
      }

      .launch-center {
        font-size: clamp(2.75rem, 16vw, 3.25rem);
      }

      .input-title {
        font-size: clamp(2.25rem, 12.2vw, 2.65rem);
      }

      .korean-name-display,
      .stroke-composition {
        font-size: clamp(3.35rem, 21vw, 4.7rem);
      }
    }

    /* Short / landscape viewports (e.g. phones turned sideways): collapse the
       vertical drama so the hero keyboard and the result never collide, and
       drop the keyboard echoes that would otherwise overrun the frame. */
    @media (max-height: 560px) and (orientation: landscape) {
      .launch-center {
        top: clamp(1.1rem, 6vh, 2.4rem);
        font-size: clamp(2.6rem, 10vh, 4.4rem);
      }

      .keyboard-bg {
        transform: translate3d(0, 14vh, 0) scale(0.9);
      }

      .stage-input .input-layout {
        transform: none;
      }

      .input-title {
        margin-bottom: 0.85rem;
        font-size: clamp(1.55rem, 7vh, 2.2rem);
      }

      .stage-result {
        place-items: center center;
        padding-block: 1rem;
      }

      .korean-name-visual {
        min-height: clamp(3.6rem, 22vh, 6rem);
        margin-top: 0.6rem;
      }

      .korean-name-display,
      .stroke-composition {
        font-size: clamp(2.8rem, 16vh, 5rem);
      }

      .input-keyboard-echo,
      .result-keyboard-echo {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="hangul-cursor" id="hangul-cursor" aria-hidden="true">ㅎ</div>
  <div class="hangul-bg" aria-hidden="true">
    <span class="hangul-char">ㄱ</span>
    <span class="hangul-char">ㅏ</span>
    <span class="hangul-char">ㅈ</span>
    <span class="hangul-char">ㅏ</span>
  </div>

  <main class="experience">
    <section class="stage stage-start is-active" id="stage-start" aria-label="KaZa keyboard language transformation" tabindex="0">
      <div class="keyboard-bg" id="keyboard-bg" aria-hidden="true"></div>
      <div class="transition-jamo" aria-hidden="true">
        <span>ㄱ</span>
        <span>ㅏ</span>
        <span>ㅈ</span>
        <span>ㅏ</span>
      </div>
      <div class="launch-center" id="launch-center" aria-live="polite">
        <span id="launch-text"></span>
        <span class="launch-cursor" aria-hidden="true"></span>
      </div>
    </section>

    <section class="stage stage-input" id="stage-input" aria-label="Name input screen">
      <div class="input-keyboard-echo" id="input-keyboard-echo" aria-hidden="true"></div>
      <div class="type-cloud" aria-hidden="true">
        <span class="type-char">ㄱ</span>
        <span class="type-char">ㄴ</span>
        <span class="type-char">ㄷ</span>
        <span class="type-char">ㄹ</span>
        <span class="type-char">ㅁ</span>
        <span class="type-char">ㅂ</span>
        <span class="type-char">ㅅ</span>
        <span class="type-char">ㅇ</span>
        <span class="type-char">ㅏ</span>
        <span class="type-char">ㅣ</span>
      </div>
      <div class="input-layout">
        <div>
          <h1 class="input-title">
            <span class="input-title-line">Find your</span>
            <span class="input-title-line">Korean name.</span>
          </h1>

          <section class="input-panel" aria-label="Generate your Korean name">
            <input
              class="name-input"
              id="name-input"
              type="text"
              placeholder="Enter your name"
              autocomplete="off"
              spellcheck="false"
              maxlength="40"
              aria-label="English name"
            />
            <button class="primary-btn generate-btn" id="generate-btn" disabled>Generate</button>
            <div class="name-transform" id="name-transform" aria-live="polite" aria-hidden="true">
              <div class="transform-source" id="transform-source"></div>
              <div class="transform-frame" id="transform-frame"></div>
            </div>
            <div class="input-support">
              <div class="generate-hint" id="generate-hint" aria-live="polite"></div>
            </div>
          </section>
        </div>
      </div>
    </section>

    <section class="stage stage-result" id="stage-result" aria-label="Korean name result screen">
      <div class="result-keyboard-echo" id="result-keyboard-echo" aria-hidden="true"></div>
      <div class="result-layout">
        <section class="reveal-section" id="reveal-section" aria-label="Korean name result" aria-live="polite">
          <div class="result-wordmark">KaZa</div>
          <div class="result-label">Korean Name</div>
          <div class="korean-name-visual">
            <div class="korean-name-display" id="korean-display"></div>
            <div class="stroke-composition" id="stroke-composition" aria-hidden="true"></div>
          </div>
          <div class="korean-roman-display" id="roman-display"></div>
          <div class="korean-original-display" id="original-display"></div>
          <div class="source-tag" id="source-tag"></div>
          <div class="result-actions">
            <button class="primary-btn pronounce-btn" id="pronounce-btn" type="button" aria-label="Play the Korean pronunciation">
              <span class="pronounce-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 5 6 9H3v6h3l5 4z" fill="currentColor" stroke="none" />
                  <path class="pronounce-wave pronounce-wave-1" d="M15.4 8.8a4.2 4.2 0 0 1 0 6.4" />
                  <path class="pronounce-wave pronounce-wave-2" d="M18.5 6.1a8 8 0 0 1 0 11.8" />
                </svg>
              </span>
              <span class="pronounce-label">Hear it</span>
            </button>
            <button class="ghost-btn" id="edit-name-btn" type="button">Try another name</button>
          </div>
        </section>

      </div>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
