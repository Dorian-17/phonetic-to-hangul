<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KaZa - Your Name in Korean</title>
  <script>
    (() => {
      const resolveTheme = () => {
        const hour = new Date().getHours();
        const isDaytime = hour >= 7 && hour < 19;
        const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
        return prefersDark || !isDaytime ? 'dark' : 'light';
      };

      const applyTheme = () => {
        const theme = resolveTheme();
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      };

      applyTheme();
      window.__kazaApplyAutoTheme = applyTheme;
    })();
  </script>
  <style>

      --text: var(--white);
      --muted: color-mix(in srgb, var(--soft-white) 70%, transparent);

    .keycap-icon {

      height: 1.2em;

    .keycap-icon-mission i {

    .keycap-icon-mission i:nth-child(1) {

      height: 0.46em;
      border: 0.14em solid currentColor;
      border-top: 0;

      top: 0.96em;

      height: 0.36em;
      border-radius: 999px;

      position: absolute;

    .keycap.is-space {
      justify-items: center;
      padding: 0;
    }

    .keycap.is-active {
      border-color: color-mix(in srgb, var(--soft-white) 50%, transparent);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--white) 22%, transparent), color-mix(in srgb, var(--soft-white) 12%, transparent) 52%, color-mix(in srgb, var(--black) 16%, transparent)),

      color: color-mix(in srgb, var(--white) 96%, transparent);
      opacity: 1;
      text-shadow:
        0 0 10px color-mix(in srgb, var(--soft-white) 84%, transparent),
        0 0 26px color-mix(in srgb, var(--soft-white) 50%, transparent);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, var(--white) 28%, transparent),
        inset 0 -6px 12px color-mix(in srgb, var(--black) 18%, transparent),
        0 7px 0 color-mix(in srgb, var(--black) 50%, transparent),
        0 0 36px color-mix(in srgb, var(--soft-white) 34%, transparent),
        0 0 84px color-mix(in srgb, var(--soft-white) 25%, transparent);

    .keycap.is-converting {
      color: color-mix(in srgb, var(--soft-white) 42%, transparent);
      text-shadow: 0 0 18px color-mix(in srgb, var(--soft-white) 18%, transparent);
      border-color: color-mix(in srgb, var(--soft-white) 18%, transparent);

    @keyframes keyboardFloat {
      0%, 100% { transform: translateY(0); }
      43% { transform: translateY(var(--lift, -14px)); }
      72% { transform: translateY(var(--dip, 6px)); }

    .launch-center {
      position: absolute;
      top: clamp(4.2rem, 11vh, 7rem);
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 8ch;

      transition: opacity 520ms var(--ease), filter 520ms var(--ease);
    }

    .launch-center.is-resetting {
      opacity: 0;
      filter: blur(8px);

    .launch-cursor {

      height: 0.86em;

    .stage-start:focus-visible {
      outline: 1px solid color-mix(in srgb, var(--soft-white) 24%, transparent);
      outline-offset: -1.5rem;

    .stage-start::after {
      content: "";

      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 36%, transparent 0%, transparent 26%, color-mix(in srgb, var(--black) 24%, transparent) 58%, color-mix(in srgb, var(--black) 72%, transparent) 100%),

    .ghost-btn {
      min-height: 58px;
      border-radius: 999px;

      cursor: pointer;
      font-weight: 850;
      transition: transform 180ms var(--ease), opacity 180ms ease, background 180ms ease;

    .primary-btn {
      background: var(--text);
      color: var(--ink);
    }

    .ghost-btn {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--white) 4%, transparent);
      color: var(--muted);
    }

    .primary-btn:hover:not(:disabled),
    .ghost-btn:hover {
      transform: translateY(-2px);
    }

    .primary-btn:disabled {
      cursor: not-allowed;
      opacity: 0.36;
      transform: none;
    }

    .stage-input {
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .input-layout {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 640px);
      justify-content: center;
      gap: 1.8rem;
      align-items: center;
      width: 100%;
      text-align: center;
    }

    .type-cloud {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;

    .type-char:nth-child(2) { --delay: -6.2s; --duration: 30s; }
    .type-char:nth-child(3) { --delay: -12.1s; --duration: 28s; }
    .type-char:nth-child(4) { --delay: -3.8s; --duration: 31s; }
    .type-char:nth-child(5) { --delay: -17.4s; --duration: 32s; }
    .type-char:nth-child(6) { --delay: -9.6s; --duration: 27s; }
    .type-char:nth-child(7) { --delay: -20.2s; --duration: 30s; }
    .type-char:nth-child(8) { --delay: -7.5s; --duration: 28s; }
    .type-char:nth-child(9) { --delay: -15.9s; --duration: 32s; }
    .type-char:nth-child(10) { --delay: -2.1s; --duration: 31s; }

    @keyframes typeFloat {
      0%, 100% {
        opacity: 0;
        filter: blur(10px);
        transform: scale(0.96);
      }
      18%, 72% {
        opacity: 0.28;
        filter: blur(0);
        transform: scale(1);
      }
      45% {
        opacity: 0.2;
        filter: blur(0);
        transform: scale(1.045);
      }
    }

    .kicker {
      color: var(--gold);
      font-size: 0.86rem;
      font-weight: 850;
    }

    .input-title {
      margin-top: 0;
      max-width: 640px;
      font-size: clamp(3.2rem, 7vw, 6.2rem);
      line-height: 0.94;
      font-weight: 950;
    }

    .input-title-line {
      display: block;
      white-space: nowrap;
    }

    .input-copy {
      max-width: 500px;
      margin-top: 1.35rem;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .input-panel {
      width: min(100%, 560px);
      margin: 2.25rem auto 0;
      padding: 0.85rem;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .name-input {
      width: 100%;
      height: 76px;
      border: 1px solid transparent;
      border-radius: 24px;
      outline: none;
      background: color-mix(in srgb, var(--white) 5%, transparent);
      color: var(--text);
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      padding: 0 1.25rem;
    }

    .name-input:focus {
      border-color: var(--line-strong);
      background: color-mix(in srgb, var(--white) 8%, transparent);
    }

    .name-input:disabled {
      opacity: 0.72;
    }

    .name-input::placeholder {
      color: var(--faint);
    }

    .generate-btn {
      width: 100%;
      margin-top: 0.65rem;
    }

    .generate-btn.is-loading {
      cursor: progress;
      opacity: 0.8;
    }

    .input-support {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding: 0.9rem 0.4rem 0.1rem;
    }

    .generate-hint {
      min-height: 1.2rem;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .example-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .example-label {
      align-self: center;
      color: var(--faint);
      font-size: 0.8rem;
      font-weight: 800;
    }

    .example-chip {
      min-height: 32px;
      padding: 0 0.85rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--white) 4%, transparent);
      color: var(--muted);
      cursor: pointer;
      transition: transform 180ms var(--ease), border-color 180ms ease, color 180ms ease, background 180ms ease;
    }

    .example-chip:hover,
    .example-chip.is-selected {
      transform: translateY(-1px);
      border-color: var(--gold);
      color: var(--text);
      background: color-mix(in srgb, var(--soft-white) 12%, transparent);
    }

    .input-side {
      min-height: 430px;
      border: 1px solid var(--line);
      border-radius: 34px;
      padding: 2rem;
      background: color-mix(in srgb, var(--white) 4%, transparent);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .side-hangul {
      color: color-mix(in srgb, var(--soft-white) 11%, transparent);
      font-size: 9rem;
      line-height: 0.9;
      font-weight: 950;
      text-align: right;
    }

    .side-caption {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 250px;
    }

    .stage-result {
      place-items: center;
      text-align: center;
    }

    .result-layout {
      display: grid;
      grid-template-columns: minmax(0, 720px);
      justify-content: center;
      gap: 1.5rem;
      align-items: center;
      width: 100%;
    }

    .result-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 2rem;
    }

    .result-label {
      color: var(--gold);
      font-size: 0.86rem;
      font-weight: 850;
    }

    .korean-name-visual {
      position: relative;
      display: grid;
      place-items: center;
      min-height: clamp(7rem, 17vw, 12rem);
      margin-top: 1.2rem;
      isolation: isolate;
    }

    .korean-name-display {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.08em;
      font-size: clamp(5rem, 13vw, 9rem);
      line-height: 0.92;
      font-weight: 950;
      transition: opacity 900ms var(--ease), filter 900ms var(--ease);
    }

    .korean-name-display.is-composition-base {
      animation: nameBaseFade 900ms var(--ease) 980ms both;
    }

    @keyframes nameBaseFade {
      from { opacity: 1; filter: blur(0); }
      to { opacity: 0.18; filter: blur(0.5px); }
    }

    .reveal-char {
      display: inline-block;
      animation: charReveal 680ms var(--ease) both;
      animation-delay: var(--delay);
    }

    @keyframes charReveal {
      from { opacity: 0; filter: blur(18px); transform: translateY(22px); }
      to { opacity: 1; filter: blur(0); transform: translateY(0); }
    }

    .stroke-composition {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.18em;
      pointer-events: none;
      font-size: clamp(5rem, 13vw, 9rem);
      line-height: 0.92;
    }

    .stroke-glyph {
      position: relative;
      display: inline-grid;
      width: 0.92em;
      height: 0.92em;
      place-items: center;
    }

    .stroke-glyph svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter:
        drop-shadow(0 0 16px color-mix(in srgb, var(--white) 16%, transparent))
        drop-shadow(0 0 34px color-mix(in srgb, var(--soft-white) 10%, transparent));
    }

    .stroke-line {
      fill: none;
      stroke: var(--white);
      stroke-width: 9.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      pathLength: 1;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      opacity: 0;
      animation:
        strokeDraw 760ms var(--ease) both,
        strokeFade 680ms var(--ease) forwards;
      animation-delay: var(--delay), var(--fade-delay);
    }

    .stroke-part {
      opacity: 0;
      animation: strokePartGlow 920ms var(--ease) both;
      animation-delay: var(--delay);
    }

    .stroke-final {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--white);
      font-weight: 950;
      line-height: 0.92;
      opacity: 0;
      filter: blur(18px);
      transform: scale(0.985);
      animation: compositionFinal 900ms var(--ease) both;
      animation-delay: var(--delay);
    }

    @keyframes strokeDraw {
      0% { opacity: 0; stroke-dashoffset: 1; }
      16% { opacity: 1; }
      100% { opacity: 1; stroke-dashoffset: 0; }
    }

    @keyframes strokeFade {
      from { opacity: 1; filter: blur(0); }
      to { opacity: 0; filter: blur(10px); }
    }

    @keyframes strokePartGlow {
      0% { opacity: 0; }
      28%, 100% { opacity: 1; }
    }

    @keyframes compositionFinal {
      0% { opacity: 0; filter: blur(18px); transform: scale(0.985); }
      100% { opacity: 1; filter: blur(0); transform: scale(1); }
    }

    .korean-roman-display {
      margin-top: 1.1rem;
      color: var(--silver);
      font-size: 1.45rem;
      font-weight: 750;
    }

    .korean-original-display {
      margin-top: 0.25rem;
      color: var(--faint);
      font-size: 0.96rem;
    }

    .source-tag {
      display: none;
      width: fit-content;
      margin-top: 1.2rem;
      padding: 0.4rem 0.75rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: color-mix(in srgb, var(--white) 4%, transparent);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .name-card {
      position: relative;
      width: 100%;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 34px;
      background: linear-gradient(145deg, color-mix(in srgb, var(--white) 13%, transparent), color-mix(in srgb, var(--white) 5%, transparent));
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: transform 360ms var(--ease), box-shadow 360ms var(--ease);
    }

    .name-card.is-updated {
      animation: cardPop 380ms var(--ease);
    }

    @keyframes cardPop {
      0% { transform: scale(0.985); }
      55% { transform: scale(1.012); }
      100% { transform: scale(1); }
    }

    .name-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, color-mix(in srgb, var(--soft-white) 18%, transparent), transparent 36%, color-mix(in srgb, var(--soft-white) 14%, transparent));
    }

    .card-content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(210px, 0.82fr) minmax(280px, 1fr);
      min-height: 390px;
    }

    .card-left {
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 2rem;
      border-right: 1px solid var(--line);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .card-brand {
      color: var(--text);
      font-size: 1.15rem;
      font-weight: 950;
    }

    .card-label {
      color: var(--muted);
      font-size: 0.78rem;
      text-align: right;
    }

    .card-left-title {
      margin-top: auto;
      color: var(--text);
      font-size: 2.25rem;
      line-height: 0.98;
      font-weight: 950;
    }

    .card-left-subtitle {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .card-left-meta {
      margin-top: 1.3rem;
      color: var(--faint);
      font-size: 0.8rem;
      font-weight: 800;
    }

    .barcode {
      width: min(100%, 220px);
      height: 54px;
      margin-top: 2.5rem;
      border-radius: 4px;
      opacity: 0.72;
      background: repeating-linear-gradient(90deg, color-mix(in srgb, var(--soft-white) 66%, transparent) 0 3px, transparent 3px 7px, color-mix(in srgb, var(--soft-white) 48%, transparent) 7px 10px, transparent 10px 15px);
    }

    .card-right {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      padding: 2rem;
    }

    .scratch-panel {
      position: relative;
      width: 100%;
      min-height: 272px;
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      background: radial-gradient(circle at 50% 22%, color-mix(in srgb, var(--soft-white) 13%, transparent), transparent 34%), color-mix(in srgb, var(--white) 4%, transparent);
      touch-action: none;
      user-select: none;
    }

    .scratch-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 272px;
      padding: 1.5rem;
      opacity: 0.42;
      filter: blur(8px);
      transform: scale(0.985);
      transition: opacity 380ms var(--ease), filter 380ms var(--ease), transform 380ms var(--ease);
    }

    .name-card.is-revealed .scratch-content {
      opacity: 1;
      filter: blur(0);
      transform: scale(1);
    }

    .scratch-canvas {
      position: absolute;
      inset: 0;
      z-index: 3;
      width: 100%;
      height: 100%;
      cursor: grab;
      transition: opacity 380ms var(--ease);
    }

    .scratch-canvas:active {
      cursor: grabbing;
    }

    .name-card.is-revealed .scratch-canvas {
      opacity: 0;
      pointer-events: none;
    }

    .scratch-prompt {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      color: color-mix(in srgb, var(--black) 52%, transparent);
      font-size: 1rem;
      font-weight: 850;
      text-align: center;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .scratch-panel.is-scratching .scratch-prompt,
    .name-card.is-revealed .scratch-prompt {
      opacity: 0;
    }

    .scratch-progress {
      position: absolute;
      right: 1rem;
      bottom: 0.85rem;
      z-index: 4;
      color: color-mix(in srgb, var(--black) 42%, transparent);
      font-size: 0.72rem;
      font-weight: 850;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .name-card.is-revealed .scratch-progress {
      opacity: 0;
    }

    .card-name {
      min-height: 4.4rem;
      color: var(--text);
      font-size: clamp(3rem, 7vw, 4.5rem);
      line-height: 1;
      font-weight: 950;
      text-align: center;
      word-break: keep-all;
    }

    .card-detail {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 0.8rem;
      width: 100%;
      padding: 0.42rem 0;
      align-items: baseline;
    }

    .card-detail-label {
      color: var(--faint);
      font-size: 0.76rem;
      font-weight: 800;
    }

    .card-detail-value {
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 700;
      overflow-wrap: anywhere;
      text-align: right;
    }

    .card-phonemes {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.45rem;
      margin-top: 1rem;
    }

    .phoneme-chip {
      padding: 0.34rem 0.56rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--white) 5%, transparent);
      color: var(--silver);
      font-family: "SF Mono", "Courier New", monospace;
      font-size: 0.72rem;
      font-weight: 850;
    }

    @media (max-width: 860px) {
      .stage {
        padding: 1.25rem 1rem 2.5rem;
      }

      .input-layout,
      .result-layout {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      .input-side {
        display: none;
      }

      .card-content {
        grid-template-columns: 1fr;
      }

      .card-left {
        min-height: 280px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .keyboard-bg {
        inset: 0;
        transform: translateY(18vh) scale(0.96);
      }

      .keyboard-bg::before {
        inset: 0 0 auto;
        height: 46vh;
      }

      .keyboard-cluster {
        --key-unit: 4.55rem;
        gap: 0.58rem;
        padding: 2.4rem 2.8rem;
      }

      .keyboard-row {
        gap: 0.5rem;
      }

      .keycap {
        height: 3.9rem;
        border-radius: 0.78rem;
        font-size: 1.32rem;
      }

      .keycap.is-special {
        font-size: 0.66rem;
        padding: 0.56rem 0.64rem;
      }

      .keyboard-row-0 .keycap {
        height: 2.8rem;
        font-size: 0.66rem;
      }

      .launch-center {
        font-size: 4.6rem;
        top: clamp(4rem, 11vh, 6.5rem);
      }
    }

    @media (max-width: 480px) {
      .keyboard-bg {
        inset: 0;
        transform: translateY(19vh) scale(0.46);
      }

      .keyboard-bg::before {
        inset: 0 0 auto;
        height: 46vh;
      }

      .keyboard-cluster {
        --key-unit: 3.95rem;
        gap: 0.46rem;
        padding: 1.9rem 2.1rem;
      }

      .keyboard-row {
        gap: 0.38rem;
      }

      .keycap {
        height: 3.35rem;
        border-radius: 0.72rem;
        font-size: 1.06rem;
      }

      .keycap.is-special {
        font-size: 0.56rem;
        padding: 0.46rem 0.5rem;
      }

      .keyboard-row-0 .keycap {
        height: 2.45rem;
        font-size: 0.56rem;
      }

      .launch-center {
        font-size: 3.8rem;
        top: 4.9rem;
      }

      .input-title {
        font-size: 3.05rem;
      }

      .input-panel {
        border-radius: 26px;
      }

      .name-input {
        height: 68px;
        border-radius: 20px;
      }

      .card-left,
      .card-right {
        padding: 1.2rem;
      }

      .scratch-panel,
      .scratch-content {
        min-height: 248px;
      }

      .card-detail {
        grid-template-columns: 1fr;
        gap: 0.15rem;
      }

      .card-detail-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="hangul-cursor" id="hangul-cursor" aria-hidden="true">ㅎ</div>
  <div class="hangul-bg" aria-hidden="true">
    <span class="hangul-char">가</span>
    <span class="hangul-char">자</span>
    <span class="hangul-char">윤</span>
    <span class="hangul-char">하</span>
  </div>

  <main class="experience">
    <section class="stage stage-start is-active" id="stage-start" aria-label="KaZa keyboard language transformation" tabindex="0">
      <div class="keyboard-bg" id="keyboard-bg" aria-hidden="true"></div>
      <div class="launch-center" id="launch-center" aria-live="polite">
        <span id="launch-text"></span>
        <span class="launch-cursor" aria-hidden="true"></span>
      </div>
    </section>

    <section class="stage stage-input" id="stage-input" aria-label="Name input screen">
      <div class="type-cloud" aria-hidden="true">
        <span class="type-char">하</span>
        <span class="type-char">노</span>
        <span class="type-char">수</span>
        <span class="type-char">민</span>
        <span class="type-char">서</span>
        <span class="type-char">도</span>
        <span class="type-char">윤</span>
        <span class="type-char">지</span>
        <span class="type-char">은</span>
        <span class="type-char">우</span>
      </div>
      <div class="input-layout">
        <div>
          <h1 class="input-title">
            <span class="input-title-line">Find your</span>
            <span class="input-title-line">Korean name.</span>
          </h1>

          <section class="input-panel" aria-label="Generate your Korean name">
            <input
              class="name-input"
              id="name-input"
              type="text"
              placeholder="Enter your name"
              autocomplete="off"
              spellcheck="false"
              maxlength="40"
              aria-label="English name"
            />
            <button class="primary-btn generate-btn" id="generate-btn" disabled>Generate</button>
            <div class="input-support">
              <div class="generate-hint" id="generate-hint" aria-live="polite"></div>
            </div>
          </section>
        </div>
      </div>
    </section>

    <section class="stage stage-result" id="stage-result" aria-label="Korean name result screen">
      <div class="result-layout">
        <section class="reveal-section" id="reveal-section" aria-label="Korean name result" aria-live="polite">
          <div class="result-label">Korean Name</div>
          <div class="korean-name-visual">
            <div class="korean-name-display" id="korean-display"></div>
            <div class="stroke-composition" id="stroke-composition" aria-hidden="true"></div>
          </div>
          <div class="korean-roman-display" id="roman-display"></div>
          <div class="korean-original-display" id="original-display"></div>
          <div class="source-tag" id="source-tag"></div>
          <div class="result-actions">
            <button class="ghost-btn" id="edit-name-btn" type="button">Try another name</button>
          </div>
        </section>

      </div>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
